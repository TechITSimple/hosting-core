# /home/tis/websites/[ENV]/hosting-core/docker-compose.yml

services:
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ${COMPOSE_PROJECT_NAME}-tunnel
    restart: always
    
    env_file:
      - ../.env
  
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
      
    command: tunnel --metrics localhost:2000 run

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    
    networks:
      - tis_proxy

networks:
  tis_proxy:
    name: ${NETWORK_NAME}
    driver: bridge
